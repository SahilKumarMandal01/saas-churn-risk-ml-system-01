name: Deploy to EC2

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # Login Docker Hub
      # -------------------------
      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -------------------------
      # Build Image
      # -------------------------
      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-api:latest .

      # -------------------------
      # Push Image
      # -------------------------
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-api:latest

      # -------------------------
      # Deploy to EC2
      # -------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/churn-api:latest
            docker stop churn-api || true
            docker rm churn-api || true

            docker run -d \
              --name churn-api \
              -p 8000:8000 \
              ${{ secrets.DOCKER_USERNAME }}/churn-api:latest